<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to this Archive!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
            --accent-glow: #1a1a24;
            --font-display: 'Cinzel', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 40%, var(--accent-glow) 0%, transparent 60%);
            color: var(--text-main);
            font-family: var(--font-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
            padding: 20px;
        }

        .welcome-container {
            text-align: center;
            max-width: 650px;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 3.5rem;
            margin: 0 0 20px 0;
            letter-spacing: 3px;
            text-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
        }

        p.description {
            font-size: 1.15rem;
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .btn-enter {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 16px 45px;
            font-size: 1.1rem;
            font-family: var(--font-body);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 30px; /* High-end pill shape style */
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
        }

        .btn-enter:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
            background-color: #ffffff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            p.description { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1>The Story</h1>
        <p class="description">
            Welcome to interesting story which encompasses two young people, Garima and Saksham and follow their journey full of ups and downs of a relationship.<br><br>(Ups of their lives are denoted by red, and Lows by black.)<br><br>Happy Exploring! 
        </p>
        
        <button class="btn-enter" onclick="window.location.href='calendar.html?start=2025-08'">
            Explore Timeline
        </button>
    </div>

</body>
</html>
