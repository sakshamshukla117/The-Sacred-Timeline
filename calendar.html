<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Calendar</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Base Premium Styling */
        :root {
            --bg-color: #000000;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            
            /* Darker Red */
            --accent-red: #8a0303; 
            
            /* Typography */
            --font-display: 'Cinzel', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        body {
            margin: 0;
            font-family: var(--font-body);
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a1a24 0%, transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .calendar-wrapper {
            width: 100%;
            max-width: 850px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Dropdown & Arrow Header Styling */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.8rem;
            cursor: pointer;
            transition: color 0.3s ease, transform 0.3s ease;
            padding: 0 10px;
            outline: none;
        }

        .nav-btn:hover:not(:disabled) {
            color: var(--text-main);
            transform: scale(1.2);
        }

        .nav-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .select-group {
            display: flex;
            gap: 15px;
        }

        select {
            appearance: none;
            -webkit-appearance: none;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 700;
            cursor: pointer;
            outline: none;
            text-align: center;
            border-bottom: 1px solid transparent;
            transition: border-bottom 0.3s ease;
            padding-bottom: 2px;
        }

        select:hover, select:focus {
            border-bottom: 1px solid var(--text-muted);
        }

        option {
            background-color: #111;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 1rem;
        }

        /* Grid Layout for the Calendar */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .weekday {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding-bottom: 10px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem; 
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            z-index: 1;
        }

        .day span {
            pointer-events: none;
        }

        .day.standard {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.02);
        }

        .day.standard:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.05);
        }

        .day.empty {
            background: transparent;
            pointer-events: none;
        }

        /* --- SPECIAL DATES STYLING --- */
        .day.special {
            cursor: pointer;
            font-size: 2rem; 
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .day.special:hover {
            transform: scale(1.1) translateY(-3px);
            z-index: 10;
        }

        .day.special.red-square {
            background-color: var(--accent-red);
            color: var(--text-main);
            box-shadow: 0 0 20px rgba(138, 3, 3, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .day.special.black-gold {
            background-color: #050505; 
            border: 1px solid rgba(212, 175, 55, 0.25); 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .day.special.black-gold span {
            background: linear-gradient(135deg, #F3E5AB 0%, #D4AF37 50%, #8B6508 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .calendar-wrapper { padding: 20px; }
            select { font-size: 1.5rem; }
            .nav-btn { font-size: 1.5rem; }
            .calendar-grid { gap: 6px; }
            .day { font-size: 1.1rem; border-radius: 6px; }
            .day.special { font-size: 1.5rem; }
            .weekday { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="calendar-wrapper">
        <div class="controls">
            <button id="prevMonth" class="nav-btn">&#10094;</button>
            
            <div class="select-group">
                <select id="monthSelect"></select>
                <select id="yearSelect"></select>
            </div>
            
            <button id="nextMonth" class="nav-btn">&#10095;</button>
        </div>
        
        <div class="calendar-grid" id="calendar">
            </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const specialDates = {
            "2025-08-26": { type: 'red-square', url: '26aug25/26aug25.html' },
        "2025-09-15": { type: 'red-square', url: '15sept25/15sept25.html' },
        "2025-09-19": { type: 'red-square', url: '19sept25/19sept25.html' },
        "2025-09-24": { type: 'red-square', url: '24sept25/24sept25.html' },
        "2025-09-26": { type: 'red-square', url: '26sept25/26sept25.html' },
        "2025-10-01": { type: 'red-square', url: '1oct25/1oct25.html' },
        "2025-10-14": { type: 'red-square', url: '14oct25/14oct25.html' },
        "2025-10-16": { type: 'red-square', url: '16oct25/16oct25.html' },
        "2025-11-25": { type: 'red-square', url: '25nov25/25nov25.html' },
        "2025-12-12": { type: 'black-gold', url: '12dec25/12dec25.html' },
        "2025-12-14": { type: 'black-gold', url: '14dec25/14dec25.html' },
        "2026-05-07": { type: 'red-square', url: '7may26/7may26.html' },
        "2026-05-22": { type: 'black-gold', url: '22may26/22may26.html' },
        "2026-06-09": { type: 'red-square', url: '9june26/9june26.html' },
        "2026-07-02": { type: 'red-square', url: '2july26/2july26.html' }
        };

        // --- CALENDAR LOGIC ---
        const monthSelect = document.getElementById('monthSelect');
        const yearSelect = document.getElementById('yearSelect');
        const calendarGrid = document.getElementById('calendar');
        const prevBtn = document.getElementById('prevMonth');
        const nextBtn = document.getElementById('nextMonth');

        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const weekdays = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

        // 1. Populate Dropdowns
        for (let y = 2025; y <= 2030; y++) {
            let option = document.createElement('option');
            option.value = y;
            option.text = y;
            yearSelect.appendChild(option);
        }

        months.forEach((m, index) => {
            let option = document.createElement('option');
            option.value = index; 
            option.text = m;
            monthSelect.appendChild(option);
        });

        // --- 2. Default to Current Date (With Dynamic URL parameter override) ---
        const urlParams = new URLSearchParams(window.location.search);
        const startParam = urlParams.get('start'); // Looks for ?start=YYYY-MM

        const today = new Date();
        let currentYear = today.getFullYear();
        let currentMonth = today.getMonth();

        if (startParam && startParam.includes('-')) {
            // Splits "2025-09" into year (2025) and month (09)
            const parts = startParam.split('-');
            const paramYear = parseInt(parts[0]);
            const paramMonth = parseInt(parts[1]) - 1; // Subtract 1 because JS months run 0-11

            // Verify the parsed date is within our allowed calendar boundaries
            if (paramYear > 2025 || (paramYear === 2025 && paramMonth >= 7)) {
                currentYear = paramYear;
                currentMonth = paramMonth;
            } else {
                // Fallback safety boundary if someone passes an invalid old date
                currentYear = 2025;
                currentMonth = 7;
            }
        } else if (currentYear < 2025 || (currentYear === 2025 && currentMonth < 7)) {
            // Standard default fallback boundary for current day checks
            currentYear = 2025;
            currentMonth = 7;
        }

        yearSelect.value = currentYear;
        monthSelect.value = currentMonth;

        // 3. Enforce Constraint (Earliest is August 2025)
        function enforceConstraints() {
            const selectedYear = parseInt(yearSelect.value);
            const selectedMonth = parseInt(monthSelect.value);
            
            for (let i = 0; i < 12; i++) {
                if (selectedYear === 2025 && i < 7) {
                    monthSelect.options[i].disabled = true;
                } else {
                    monthSelect.options[i].disabled = false;
                }
            }

            if (selectedYear === 2025 && selectedMonth < 7) {
                monthSelect.value = 7; 
            }

            // Disable Left Arrow if currently on August 2025
            if (selectedYear === 2025 && parseInt(monthSelect.value) <= 7) {
                prevBtn.disabled = true;
            } else {
                prevBtn.disabled = false;
            }

            // Disable Right Arrow if currently on December 2030 (Max Year)
            if (selectedYear === 2030 && parseInt(monthSelect.value) === 11) {
                nextBtn.disabled = true;
            } else {
                nextBtn.disabled = false;
            }
        }

        // 4. Arrow Navigation Logic
        function changeMonth(direction) {
            let currentY = parseInt(yearSelect.value);
            let currentM = parseInt(monthSelect.value);

            currentM += direction;

            // Handle year rollover
            if (currentM < 0) {
                currentM = 11;
                currentY -= 1;
            } else if (currentM > 11) {
                currentM = 0;
                currentY += 1;
            }

            // Stop execution if trying to go out of bounds
            if (currentY < 2025 || (currentY === 2025 && currentM < 7)) return;
            if (currentY > 2030) return;

            yearSelect.value = currentY;
            monthSelect.value = currentM;

            enforceConstraints();
            renderCalendar();
        }

        // 5. Render Calendar
        function renderCalendar() {
            calendarGrid.innerHTML = '';

            // Add Weekday Headers
            weekdays.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.className = 'weekday';
                dayHeader.innerText = day;
                calendarGrid.appendChild(dayHeader);
            });

            const year = parseInt(yearSelect.value);
            const month = parseInt(monthSelect.value);

            const totalDays = new Date(year, month + 1, 0).getDate();
            
            let rawStartDay = new Date(year, month, 1).getDay();
            const startDayOffset = (rawStartDay + 6) % 7; 

            // Empty slots
            for (let i = 0; i < startDayOffset; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'day empty';
                calendarGrid.appendChild(emptyDiv);
            }

            // Actual days
            for (let i = 1; i <= totalDays; i++) {
                const dayDiv = document.createElement('div');
                
                dayDiv.innerHTML = `<span>${i}</span>`;

                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;

                if (specialDates[dateKey]) {
                    const specialData = specialDates[dateKey];
                    dayDiv.className = `day special ${specialData.type}`;
                    
                    dayDiv.onclick = () => {
                        window.open(specialData.url, '_blank');
                    };
                } else {
                    dayDiv.className = 'day standard';
                }

                calendarGrid.appendChild(dayDiv);
            }
        }

        // 6. Event Listeners
        yearSelect.addEventListener('change', () => {
            enforceConstraints();
            renderCalendar();
        });

        monthSelect.addEventListener('change', () => {
            enforceConstraints();
            renderCalendar();
        });

        prevBtn.addEventListener('click', () => changeMonth(-1));
        nextBtn.addEventListener('click', () => changeMonth(1));

        // 7. Init
        enforceConstraints();
        renderCalendar();
    </script>

</body>
</html>
